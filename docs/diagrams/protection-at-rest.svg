<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif">
  <rect width="760" height="400" rx="14" fill="#f6f8fb" stroke="#e2e8f0"/>
  <text x="28" y="42" font-size="20" font-weight="700" fill="#0f172a">1 · At rest — on the server</text>
  <text x="28" y="66" font-size="13" fill="#475569">What a stolen disk, a leaked backup, or a nosy provider actually sees.</text>

  <!-- host box -->
  <rect x="28" y="90" width="452" height="284" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="48" y="116" font-size="13" font-weight="700" fill="#334155">Untrusted host (rented server / cloud)</text>

  <!-- stored object -->
  <rect x="48" y="132" width="412" height="86" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="64" y="156" font-size="12" font-weight="700" fill="#3730a3">A stored object on disk</text>
  <rect x="64" y="168" width="262" height="34" rx="5" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="76" y="190" font-size="12" fill="#1e3a8a">AES-256-GCM ciphertext</text>
  <rect x="338" y="168" width="108" height="34" rx="5" fill="#e9d5ff" stroke="#c4b5fd"/>
  <text x="352" y="190" font-size="11.5" fill="#5b21b6">sealed key</text>

  <!-- the cipher -->
  <rect x="48" y="234" width="200" height="122" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="62" y="258" font-size="12.5" font-weight="700" fill="#166534">The lock: the cipher</text>
  <text x="62" y="282" font-size="11.5" fill="#166534">AES-256-GCM. Even the</text>
  <text x="62" y="299" font-size="11.5" fill="#166534">best quantum attack only</text>
  <text x="62" y="316" font-size="11.5" fill="#166534">halves it — leaving ~128-bit</text>
  <text x="62" y="333" font-size="11.5" fill="#166534">strength. Brute-force-proof.</text>

  <!-- the key -->
  <rect x="260" y="234" width="200" height="122" rx="8" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="274" y="258" font-size="12.5" font-weight="700" fill="#5b21b6">The key that opens it</text>
  <text x="274" y="282" font-size="11.5" fill="#5b21b6">wrapped with post-quantum</text>
  <text x="274" y="299" font-size="11.5" fill="#5b21b6">ML-KEM-1024 (NIST FIPS</text>
  <text x="274" y="316" font-size="11.5" fill="#5b21b6">203) — or, in custody mode,</text>
  <text x="274" y="333" font-size="11.5" fill="#5b21b6">not on the server at all.</text>

  <!-- attacker -->
  <rect x="504" y="132" width="228" height="120" rx="10" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="520" y="158" font-size="13" font-weight="700" fill="#991b1b">Attacker / provider</text>
  <text x="520" y="180" font-size="11.5" fill="#991b1b">Copies the entire disk…</text>
  <circle cx="533" cy="212" r="11" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <path d="M527 206 L539 218 M539 206 L527 218" stroke="#dc2626" stroke-width="2.5"/>
  <text x="552" y="210" font-size="12.5" font-weight="700" fill="#dc2626">only ciphertext</text>
  <text x="552" y="228" font-size="11.5" fill="#7f1d1d">no key = unreadable</text>
  <path d="M480 175 L504 175" stroke="#94a3b8" stroke-width="2" marker-end="url(#a2)"/>

  <!-- who guarantees -->
  <rect x="504" y="266" width="228" height="90" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="520" y="292" font-size="12.5" font-weight="700" fill="#1d4ed8">Who guarantees it</text>
  <text x="520" y="314" font-size="12" fill="#1e40af">KerPlace — encrypts every</text>
  <text x="520" y="331" font-size="12" fill="#1e40af">write automatically, no</text>
  <text x="520" y="348" font-size="12" fill="#1e40af">switch to forget to flip.</text>

  <defs><marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#94a3b8"/></marker></defs>
</svg>
