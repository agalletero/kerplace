<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="520" rx="14" fill="#ffffff"/>

  <text x="450" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Multi-gateway HA — no S3-plane single point of failure</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">stateless gateways behind a load balancer, one durable cluster — durability ≠ availability</text>

  <!-- clients -->
  <rect x="370" y="80" width="160" height="40" rx="9" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e40af">S3 clients (mc / aws / SDK)</text>

  <!-- load balancer -->
  <rect x="350" y="146" width="200" height="46" rx="9" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
  <text x="450" y="167" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5b21b6">load balancer / VIP</text>
  <text x="450" y="184" text-anchor="middle" font-size="11" fill="#7c3aed">health: /minio/health/live · no affinity</text>

  <line x1="450" y1="120" x2="450" y2="144" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- gateways -->
  <g>
    <rect x="80" y="232" width="210" height="78" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="185" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">gateway 1 (stateless)</text>
    <text x="185" y="278" text-anchor="middle" font-size="11" fill="#047857">no shard · no session store</text>
    <text x="185" y="295" text-anchor="middle" font-size="11" fill="#047857">CLUSTER_LOCKS=true</text>

    <rect x="345" y="232" width="210" height="78" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="450" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">gateway 2 (stateless)</text>
    <text x="450" y="278" text-anchor="middle" font-size="11" fill="#047857">identical config</text>
    <text x="450" y="295" text-anchor="middle" font-size="11" fill="#047857">KMS custody + OIDC/STS</text>

    <rect x="610" y="232" width="210" height="78" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="715" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">gateway 3 (stateless)</text>
    <text x="715" y="278" text-anchor="middle" font-size="11" fill="#047857">add/remove freely</text>
    <text x="715" y="295" text-anchor="middle" font-size="11" fill="#047857">LB routes around failure</text>
  </g>
  <line x1="410" y1="192" x2="200" y2="230" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="450" y1="192" x2="450" y2="230" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="490" y1="192" x2="700" y2="230" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- cluster -->
  <rect x="150" y="372" width="600" height="92" rx="11" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <text x="450" y="398" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">drive nodes — the durable cluster (Reed–Solomon K+M + replicated metadata)</text>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
    <rect x="200" y="412" width="100" height="38" rx="7" fill="#fff7ed" stroke="#fb923c" stroke-width="1.6"/>
    <text x="250" y="436" text-anchor="middle" font-size="12" fill="#9a3412">drive 0</text>
    <rect x="320" y="412" width="100" height="38" rx="7" fill="#fff7ed" stroke="#fb923c" stroke-width="1.6"/>
    <text x="370" y="436" text-anchor="middle" font-size="12" fill="#9a3412">drive 1</text>
    <rect x="440" y="412" width="100" height="38" rx="7" fill="#fff7ed" stroke="#fb923c" stroke-width="1.6"/>
    <text x="490" y="436" text-anchor="middle" font-size="12" fill="#9a3412">drive 2</text>
    <text x="630" y="436" text-anchor="middle" font-size="12" fill="#b45309">… + parity</text>
  </g>
  <line x1="185" y1="310" x2="330" y2="370" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="450" y1="310" x2="450" y2="370" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="715" y1="310" x2="570" y2="370" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="600" y="345" text-anchor="middle" font-size="11" fill="#475569">fenced quorum locks (writes safe across gateways)</text>

  <text x="450" y="494" text-anchor="middle" font-size="11.5" fill="#64748b">Requirement: off-host key custody (KMS / shared passphrase) + shared root secret + same cluster secret — so every gateway is interchangeable.</text>
</svg>
