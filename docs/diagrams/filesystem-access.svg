<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="500" rx="14" fill="#ffffff"/>

  <text x="450" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Filesystem &amp; legacy access to KerPlace</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#64748b">POSIX apps reach object storage through a FUSE mount over the S3 API — not a special storage backend</text>

  <!-- S3-native clients (direct path) -->
  <rect x="40" y="104" width="200" height="120" rx="11" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="140" y="132" text-anchor="middle" font-size="14.5" font-weight="700" fill="#166534">S3-native clients</text>
  <line x1="60" y1="144" x2="220" y2="144" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="62" y="166" font-size="12" fill="#334155">• mc · aws s3 · rclone</text>
  <text x="62" y="186" font-size="12" fill="#334155">• any S3 SDK</text>
  <text x="62" y="206" font-size="12" fill="#334155">• curl + SigV4</text>

  <!-- POSIX / legacy apps -->
  <rect x="40" y="266" width="200" height="120" rx="11" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="140" y="294" text-anchor="middle" font-size="14.5" font-weight="700" fill="#9a3412">POSIX / legacy apps</text>
  <line x1="60" y1="306" x2="220" y2="306" stroke="#fed7aa" stroke-width="1.2"/>
  <text x="62" y="328" font-size="12" fill="#334155">• expect a mounted dir</text>
  <text x="62" y="348" font-size="12" fill="#334155">• open/read/write files</text>
  <text x="62" y="368" font-size="12" fill="#334155">• no S3 awareness</text>

  <!-- s3fs / FUSE translator -->
  <rect x="330" y="266" width="210" height="120" rx="11" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="435" y="294" text-anchor="middle" font-size="14.5" font-weight="700" fill="#312e81">s3fs-fuse</text>
  <text x="435" y="313" text-anchor="middle" font-size="11.5" fill="#3730a3">via kerplace.sh mount-all</text>
  <line x1="350" y1="324" x2="520" y2="324" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="435" y="346" text-anchor="middle" font-size="12" fill="#334155">POSIX  ⇄  S3 + SigV4</text>
  <text x="435" y="366" text-anchor="middle" font-size="12" fill="#334155">path-style addressing</text>

  <!-- KerPlace S3 API + erasure store -->
  <rect x="650" y="150" width="210" height="190" rx="11" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="755" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">KerPlace</text>
  <text x="755" y="199" text-anchor="middle" font-size="11.5" fill="#15803d">S3 API :9000</text>
  <line x1="670" y1="211" x2="840" y2="211" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="672" y="233" font-size="12" fill="#334155">• erasure store (default)</text>
  <text x="672" y="253" font-size="12" fill="#334155">• Reed-Solomon K+M</text>
  <text x="672" y="273" font-size="12" fill="#334155">• post-quantum at rest</text>
  <text x="672" y="293" font-size="12" fill="#334155">• BLAKE3 bitrot heal</text>
  <text x="672" y="320" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">one durable backend</text>

  <!-- arrows -->
  <line x1="240" y1="164" x2="648" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="170" text-anchor="middle" font-size="10.5" fill="#64748b">direct S3 (recommended)</text>
  <line x1="240" y1="326" x2="328" y2="326" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="312" x2="648" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="596" y="306" text-anchor="middle" font-size="10.5" fill="#64748b">S3</text>

  <!-- footer note: NOT the fs backend -->
  <rect x="40" y="410" width="820" height="70" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.3"/>
  <text x="56" y="434" font-size="12" font-weight="700" fill="#991b1b">✗ This is not what KP_BACKEND=fs is for</text>
  <text x="56" y="454" font-size="11.5" fill="#334155">KP_BACKEND=fs is a legacy single-disk mirror, not a gateway that serves your existing directories over S3.</text>
  <text x="56" y="470" font-size="11.5" fill="#334155">For a filesystem view of your data, keep the erasure default and mount it with s3fs — do not reach for the fs backend.</text>
</svg>
