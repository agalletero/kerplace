<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif">
  <rect width="760" height="360" rx="14" fill="#f6f8fb" stroke="#e2e8f0"/>
  <text x="28" y="42" font-size="20" font-weight="700" fill="#0f172a">2 · In transit — over the internet</text>
  <text x="28" y="66" font-size="13" fill="#475569">Everything between you and the host rides one post-quantum tunnel.</text>

  <!-- device -->
  <rect x="28" y="120" width="176" height="120" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="116" y="150" font-size="13" font-weight="700" fill="#5b21b6" text-anchor="middle">Your laptop</text>
  <text x="116" y="172" font-size="11.5" fill="#5b21b6" text-anchor="middle">mounted folder,</text>
  <text x="116" y="188" font-size="11.5" fill="#5b21b6" text-anchor="middle">your key vault</text>

  <!-- host -->
  <rect x="556" y="120" width="176" height="120" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="644" y="150" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">The host</text>
  <text x="644" y="172" font-size="11.5" fill="#64748b" text-anchor="middle">KerPlace,</text>
  <text x="644" y="188" font-size="11.5" fill="#64748b" text-anchor="middle">your ciphertext</text>

  <!-- tunnel -->
  <rect x="224" y="140" width="312" height="80" rx="40" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="380" y="168" font-size="13" font-weight="700" fill="#92400e" text-anchor="middle">SSH tunnel</text>
  <text x="380" y="188" font-size="12" fill="#92400e" text-anchor="middle">key exchange: mlkem768x25519-sha256</text>
  <text x="380" y="206" font-size="11.5" fill="#a16207" text-anchor="middle">hybrid post-quantum (ML-KEM-768 + X25519)</text>
  <path d="M204 180 L222 180" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a3)"/>
  <path d="M538 180 L556 180" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a3)"/>

  <!-- refuses fallback -->
  <rect x="28" y="264" width="344" height="72" rx="10" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="46" y="290" font-size="12.5" font-weight="700" fill="#991b1b">No silent downgrade</text>
  <text x="46" y="311" font-size="11.5" fill="#7f1d1d">If the far end can't do post-quantum key</text>
  <text x="46" y="327" font-size="11.5" fill="#7f1d1d">exchange, the tunnel refuses to open. Ever.</text>

  <!-- who guarantees -->
  <rect x="388" y="264" width="344" height="72" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="406" y="290" font-size="12.5" font-weight="700" fill="#1d4ed8">Who guarantees it</text>
  <text x="406" y="311" font-size="11.5" fill="#1e40af">OpenSSH — standard, audited software —</text>
  <text x="406" y="327" font-size="11.5" fill="#1e40af">pinned by policy to accept only ML-KEM.</text>

  <defs><marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker></defs>
</svg>
