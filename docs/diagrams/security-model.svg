<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="540" rx="14" fill="#ffffff"/>

  <text x="450" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">At-rest envelope encryption &amp; key custody</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">a per-object data key seals the bytes; the data key is stored only in wrapped form — the KeyProvider owns the key that wraps it</text>

  <!-- object / plaintext -->
  <rect x="36" y="110" width="200" height="150" rx="11" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="136" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Object payload</text>
  <line x1="56" y1="150" x2="216" y2="150" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="56" y="174" font-size="12" fill="#334155">fresh per-object DEK (256-bit)</text>
  <text x="56" y="196" font-size="12" fill="#334155">AES-256-GCM, 64 KiB chunks</text>
  <text x="56" y="218" font-size="12" fill="#334155">BLAKE3 bitrot check (integrity)</text>
  <text x="56" y="244" font-size="11.5" fill="#64748b">container magic KPE\x01</text>

  <!-- KeyProvider seam -->
  <rect x="330" y="96" width="220" height="180" rx="11" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
  <text x="440" y="124" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">trait KeyProvider</text>
  <text x="440" y="142" text-anchor="middle" font-size="11.5" fill="#7c3aed">owns the KEK · never exposes it</text>
  <line x1="350" y1="154" x2="530" y2="154" stroke="#ddd6fe" stroke-width="1.2"/>
  <text x="350" y="178" font-size="12.5" fill="#334155">new_wrapped_dek() → (DEK, WrappedDek)</text>
  <text x="350" y="200" font-size="12.5" fill="#334155">unwrap_dek(WrappedDek) → DEK</text>
  <text x="350" y="222" font-size="12.5" fill="#334155">posture() · check()</text>
  <text x="350" y="252" font-size="11.5" fill="#64748b">same seam for every custody mode —</text>
  <text x="350" y="268" font-size="11.5" fill="#64748b">no cipher or HTTP change to add one</text>

  <!-- providers -->
  <rect x="636" y="88" width="228" height="142" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  <text x="750" y="108" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065f46">implemented providers</text>
  <text x="750" y="129" text-anchor="middle" font-size="11.5" fill="#047857">file ✓ — KEK on host (master.key + pq.bin)</text>
  <text x="750" y="146" text-anchor="middle" font-size="11.5" fill="#047857">ML-KEM-1024 wrap, AES master legacy</text>
  <text x="750" y="169" text-anchor="middle" font-size="11.5" fill="#047857">passphrase ✓ — Argon2id KEK, off-host</text>
  <text x="750" y="186" text-anchor="middle" font-size="11.5" fill="#047857">never on disk; AES-256 wrap</text>
  <text x="750" y="209" text-anchor="middle" font-size="11.5" fill="#047857">kms ✓ — Vault Transit, KEK off-host</text>
  <text x="750" y="226" text-anchor="middle" font-size="11.5" fill="#047857">wrap/unwrap = KMS call; revocable</text>

  <rect x="636" y="242" width="228" height="38" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="750" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">planned: tpm · pkcs11 · KMIP</text>

  <!-- arrows -->
  <line x1="236" y1="185" x2="326" y2="185" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="281" y="176" text-anchor="middle" font-size="11" fill="#475569">wrap</text>
  <line x1="550" y1="150" x2="632" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="210" x2="632" y2="258" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <!-- on-disk container -->
  <rect x="36" y="320" width="828" height="92" rx="11" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <text x="50" y="346" font-size="13" font-weight="700" fill="#92400e">On disk (KPE\x01 container header):</text>
  <text x="50" y="372" font-size="12.5" fill="#334155" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">magic · version · alg · wrappedDekLen · WrappedDek · baseNonce · AES-GCM chunks…</text>
  <text x="50" y="398" font-size="12" fill="#b45309">The data key is NEVER written in the clear — only its wrapped form. Rotating the KEK re-wraps the DEK; it never re-encrypts the data.</text>

  <!-- honesty footer -->
  <rect x="36" y="430" width="828" height="78" rx="11" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
  <text x="50" y="456" font-size="13" font-weight="700" fill="#991b1b">Honest posture (the `file` provider):</text>
  <text x="50" y="480" font-size="12" fill="#334155">✓ Protects media theft — a stolen/discarded disk, or a backup that EXCLUDES the key directory.</text>
  <text x="50" y="500" font-size="12" fill="#334155">✗ Does NOT protect host compromise, or theft of the whole data directory (keys included). The server reports this at startup, in `info`, and in the console.</text>
</svg>
