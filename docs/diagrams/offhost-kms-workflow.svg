<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="460" rx="14" fill="#ffffff"/>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Working with the data: plaintext on your laptop, ciphertext on the host</text>
  <text x="450" y="57" text-anchor="middle" font-size="12.5" fill="#64748b">a file op flows out as S3; the host can only turn it into data by calling your KMS back home</text>

  <!-- LAPTOP zone -->
  <rect x="28" y="80" width="392" height="338" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="224" y="104" text-anchor="middle" font-size="14.5" font-weight="700" fill="#166534">Your laptop  (trusted)</text>

  <rect x="52" y="120" width="344" height="58" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.3"/>
  <text x="66" y="141" font-size="12.5" font-weight="700" fill="#0f172a">./buckets/&lt;bucket&gt;/…   (a normal folder)</text>
  <text x="66" y="160" font-size="11.5" fill="#334155">cat / cp / edit — plaintext files</text>

  <rect x="52" y="194" width="344" height="48" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.3"/>
  <text x="66" y="223" font-size="12.5" font-weight="700" fill="#312e81">s3fs-fuse   (POSIX ⇄ S3 + SigV4)</text>

  <rect x="52" y="300" width="344" height="96" rx="8" fill="#ecfdf5" stroke="#22c55e" stroke-width="1.6"/>
  <text x="66" y="324" font-size="13" font-weight="700" fill="#065f46">Vault KMS  (Transit)</text>
  <text x="66" y="345" font-size="11.5" fill="#334155">the ONLY place a DEK is unwrapped</text>
  <text x="66" y="364" font-size="11.5" fill="#334155">persistent · auto-unsealed · revocable</text>
  <text x="66" y="383" font-size="11.5" font-weight="700" fill="#065f46">close laptop / revoke → host goes dark</text>

  <!-- HOST zone -->
  <rect x="480" y="80" width="392" height="338" rx="12" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
  <text x="676" y="104" text-anchor="middle" font-size="14.5" font-weight="700" fill="#991b1b">Host  (untrusted)</text>

  <rect x="504" y="146" width="344" height="58" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1.3"/>
  <text x="518" y="167" font-size="12.5" font-weight="700" fill="#0f172a">KerPlace</text>
  <text x="518" y="186" font-size="11.5" fill="#334155">encrypts on write · decrypts on read (via KMS)</text>

  <rect x="504" y="300" width="344" height="96" rx="8" fill="#fff1f2" stroke="#fda4af" stroke-width="1.3"/>
  <text x="518" y="324" font-size="13" font-weight="700" fill="#9f1239">erasure store  /kerplace</text>
  <text x="518" y="345" font-size="11.5" fill="#334155">KPE1 + vault:v1:… + ciphertext shards</text>
  <text x="518" y="364" font-size="11.5" fill="#334155">Reed-Solomon K+M · BLAKE3</text>
  <text x="518" y="383" font-size="11.5" font-weight="700" fill="#9f1239">no plaintext, no unwrap key here</text>

  <!-- arrows inside laptop: files -> s3fs -->
  <line x1="224" y1="178" x2="224" y2="192" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- s3fs -> KerPlace (the tunnel) -->
  <line x1="396" y1="218" x2="502" y2="172" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="449" y="183" text-anchor="middle" font-size="10" fill="#64748b">S3 PUT/GET</text>
  <text x="449" y="290" text-anchor="middle" font-size="10.5" font-weight="700" fill="#334155">SSH reverse tunnel</text>
  <text x="449" y="304" text-anchor="middle" font-size="10.5" font-weight="700" fill="#334155">(adminKP --enable)</text>

  <!-- KerPlace <-> erasure -->
  <line x1="676" y1="204" x2="676" y2="298" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="690" y="255" font-size="10" fill="#64748b">shard</text>

  <!-- KerPlace -> KMS unwrap (host back to laptop) -->
  <line x1="504" y1="186" x2="300" y2="318" stroke="#16a34a" stroke-width="2.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="404" y="232" text-anchor="middle" font-size="10.5" font-weight="700" fill="#15803d">unwrap DEK (vault:v1:)</text>
  <text x="404" y="246" text-anchor="middle" font-size="10.5" font-weight="700" fill="#15803d">TLS, private CA (KP_KMS_CA)</text>
</svg>
