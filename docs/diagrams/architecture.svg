<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="540" rx="14" fill="#ffffff"/>
  <text x="440" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">KerPlace architecture</text>
  <text x="440" y="57" text-anchor="middle" font-size="12.5" fill="#64748b">hexagonal: one ObjectStore trait separates the S3 layer from the storage backends</text>

  <!-- clients -->
  <rect x="40" y="74" width="560" height="52" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="320" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">clients</text>
  <text x="320" y="116" text-anchor="middle" font-size="11.5" fill="#475569">mc · aws CLI · S3 SDKs · s3fs · rclone · web browser</text>
  <line x1="320" y1="126" x2="320" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- HTTP layer -->
  <rect x="40" y="152" width="560" height="74" rx="9" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
  <text x="320" y="172" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a8a">HTTP layer (axum)</text>
  <rect x="58" y="182" width="170" height="36" rx="7" fill="#ffffff" stroke="#93c5fd"/>
  <text x="143" y="205" text-anchor="middle" font-size="11.5" fill="#1e40af">S3 API · SigV4</text>
  <rect x="240" y="182" width="160" height="36" rx="7" fill="#ffffff" stroke="#93c5fd"/>
  <text x="320" y="205" text-anchor="middle" font-size="11.5" fill="#1e40af">web console</text>
  <rect x="412" y="182" width="170" height="36" rx="7" fill="#ffffff" stroke="#93c5fd"/>
  <text x="497" y="205" text-anchor="middle" font-size="11.5" fill="#1e40af">admin API (mc admin)</text>
  <line x1="320" y1="226" x2="320" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- ObjectStore trait -->
  <rect x="40" y="252" width="560" height="46" rx="9" fill="#faf5ff" stroke="#a855f7" stroke-width="1.8"/>
  <text x="320" y="280" text-anchor="middle" font-size="13.5" font-weight="700" fill="#6b21a8">ObjectStore trait — the storage seam</text>
  <line x1="320" y1="298" x2="320" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- backends -->
  <rect x="40" y="322" width="360" height="66" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="220" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">ErasureStore  (default)</text>
  <text x="220" y="368" text-anchor="middle" font-size="11" fill="#4338ca">Reed-Solomon shards · bitrot heal · write quorum</text>
  <rect x="416" y="322" width="184" height="66" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="508" y="348" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">FsStore</text>
  <text x="508" y="368" text-anchor="middle" font-size="10.5" fill="#64748b">KP_BACKEND=fs · mirror</text>
  <line x1="220" y1="388" x2="220" y2="412" stroke="#475569" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- drive trait -->
  <rect x="40" y="414" width="360" height="96" rx="9" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.7"/>
  <text x="220" y="436" text-anchor="middle" font-size="12.5" font-weight="700" fill="#075985">Drive trait (a shard slot)</text>
  <rect x="58" y="448" width="150" height="50" rx="7" fill="#ffffff" stroke="#7dd3fc"/>
  <text x="133" y="470" text-anchor="middle" font-size="11.5" fill="#0369a1">LocalDrive</text>
  <text x="133" y="487" text-anchor="middle" font-size="10" fill="#64748b">local disk</text>
  <rect x="232" y="448" width="150" height="50" rx="7" fill="#ffffff" stroke="#7dd3fc"/>
  <text x="307" y="470" text-anchor="middle" font-size="11.5" fill="#0369a1">RemoteDrive</text>
  <text x="307" y="487" text-anchor="middle" font-size="10" fill="#64748b">→ a cluster node</text>

  <!-- cross-cutting -->
  <rect x="624" y="322" width="216" height="188" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.6"/>
  <text x="732" y="346" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9a3412">cross-cutting</text>
  <text x="732" y="374" text-anchor="middle" font-size="11.5" fill="#7c2d12">post-quantum at-rest</text>
  <text x="732" y="390" text-anchor="middle" font-size="11.5" fill="#7c2d12">encryption (ML-KEM+AES)</text>
  <text x="732" y="420" text-anchor="middle" font-size="11.5" fill="#7c2d12">versioning + audit trail</text>
  <text x="732" y="436" text-anchor="middle" font-size="11.5" fill="#7c2d12">(who · where · when)</text>
  <text x="732" y="466" text-anchor="middle" font-size="11.5" fill="#7c2d12">object lock · lifecycle</text>
  <text x="732" y="490" text-anchor="middle" font-size="11.5" fill="#7c2d12">TLS · IAM policies</text>
</svg>
