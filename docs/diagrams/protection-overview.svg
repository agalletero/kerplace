<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif">
  <rect width="840" height="300" rx="14" fill="#f6f8fb" stroke="#e2e8f0"/>
  <text x="28" y="40" font-size="20" font-weight="700" fill="#0f172a">The journey of your data — three moments, three guarantees</text>

  <!-- your device -->
  <rect x="28" y="72" width="230" height="200" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="46" y="100" font-size="14" font-weight="700" fill="#5b21b6">Your device (you)</text>
  <rect x="46" y="116" width="194" height="52" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="60" y="140" font-size="12" fill="#5b21b6">Your key vault holds the</text>
  <text x="60" y="156" font-size="12" fill="#5b21b6">one key that unlocks all.</text>
  <rect x="46" y="178" width="194" height="42" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="60" y="204" font-size="12" fill="#5b21b6">USB key = physical trigger</text>
  <text x="118" y="252" font-size="12" fill="#6d28d9" text-anchor="middle" font-weight="700">keys stay with you</text>

  <!-- tunnel -->
  <rect x="288" y="150" width="264" height="46" rx="23" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="420" y="170" font-size="12.5" font-weight="700" fill="#92400e" text-anchor="middle">2 · In transit</text>
  <text x="420" y="187" font-size="11.5" fill="#92400e" text-anchor="middle">SSH tunnel · ML-KEM-768 (post-quantum)</text>
  <path d="M258 173 L286 173" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ar)"/>
  <path d="M554 173 L582 173" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- host -->
  <rect x="582" y="72" width="230" height="200" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="600" y="100" font-size="14" font-weight="700" fill="#334155">Untrusted host</text>
  <text x="600" y="118" font-size="11" fill="#64748b">rented server / cloud</text>
  <rect x="600" y="130" width="194" height="58" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="614" y="152" font-size="12" font-weight="700" fill="#1e3a8a">1 · At rest</text>
  <text x="614" y="170" font-size="11.5" fill="#1e40af">AES-256 ciphertext +</text>
  <text x="614" y="184" font-size="11.5" fill="#1e40af">a sealed key it can't open</text>
  <rect x="600" y="196" width="194" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="614" y="218" font-size="12" font-weight="700" fill="#475569">KerPlace</text>
  <text x="614" y="236" font-size="11.5" fill="#475569">does the encryption, but</text>
  <text x="614" y="250" font-size="11.5" fill="#475569">must ask you for the key.</text>

  <!-- in use badge -->
  <rect x="288" y="222" width="264" height="50" rx="10" fill="#dcfce7" stroke="#86efac"/>
  <text x="420" y="243" font-size="12.5" font-weight="700" fill="#166534" text-anchor="middle">3 · In use</text>
  <text x="420" y="260" font-size="11.5" fill="#166534" text-anchor="middle">you see plaintext; decrypt only with your key</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
  </defs>
</svg>
