name: release

# On a version tag (e.g. v0.1.0), build a fully-static (musl) Linux binary and
# attach it to the GitHub release. musl links no glibc, so it runs on any
# x86_64 Linux — including old distributions.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  static-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          mkdir -p dist
          BIN="kerplace-${GITHUB_REF_NAME}-x86_64-linux-musl"
          cp target/x86_64-unknown-linux-musl/release/kerplace "dist/${BIN}"
          strip "dist/${BIN}" || true
          ( cd dist && sha256sum "${BIN}" > "${BIN}.sha256" )
          file "dist/${BIN}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
