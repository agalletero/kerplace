name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  # Treat compiler warnings as errors so the tree stays clean.
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose
